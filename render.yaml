databases:
  - name: hrms-db
    databaseName: hrms
    user: hrms
    plan: free

services:
  - type: redis
    name: hrms-redis
    plan: free
    ipAllowList: []

  - type: web
    name: hrms-visionaries          # → https://hrms-visionaries.onrender.com
    env: python
    plan: free
    buildCommand: "./build.sh"
    preDeployCommand: "python manage.py migrate --no-input && python manage.py seed_users"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "hrms-visionaries.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://hrms-visionaries-frontend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString
      # Add these in the Render dashboard after signing up at cloudinary.com
      # - key: CLOUDINARY_CLOUD_NAME
      # - key: CLOUDINARY_API_KEY
      # - key: CLOUDINARY_API_SECRET

  - type: worker
    name: hrms-celery
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config.celery worker --loglevel=info"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString

  - type: web
    name: hrms-visionaries-frontend  # → https://hrms-visionaries-frontend.onrender.com
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "https://hrms-visionaries.onrender.com/api/v1"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
