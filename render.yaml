databases:
  - name: hrms-db
    databaseName: hrms
    user: hrms
    plan: free

services:
  - type: redis
    name: hrms-redis
    plan: free
    ipAllowList: []

  - type: web
    name: hrms-backend
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString
      # Set these manually in the Render dashboard after signing up for Cloudinary
      # - key: CLOUDINARY_CLOUD_NAME
      # - key: CLOUDINARY_API_KEY
      # - key: CLOUDINARY_API_SECRET
      # Set to your frontend URL after deploying (e.g. https://hrms-frontend.onrender.com)
      # - key: CORS_ALLOWED_ORIGINS
      # - key: ALLOWED_HOSTS

  - type: worker
    name: hrms-celery
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config.celery worker --loglevel=info"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: hrms-redis
          property: connectionString

  - type: web
    name: hrms-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: ./frontend/dist
    envVars:
      # Set this to your backend URL after deploying, e.g. https://hrms-backend.onrender.com
      - key: VITE_API_URL
        value: "https://hrms-backend.onrender.com/api/v1"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
